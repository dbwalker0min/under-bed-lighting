name: Build ESPHome

on:
  push:
    branches:
      - main
    tags:
      - 'fw*'
  pull_request:
    paths:
      - 'esphome/**'
      - '.github/workflows/build-esphome.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ESPHOME_VERSION: 2026.2.4

    defaults:
      run:
        shell: bash
        working-directory: esphome

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache PlatformIO
        id: cache-platformio
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-esphome-${{ env.ESPHOME_VERSION }}
          restore-keys: |
            platformio-${{ runner.os }}-esphome-
            platformio-${{ runner.os }}-

      - name: Cache ESPHome build tree
        id: cache-esphome
        uses: actions/cache@v5
        with:
          path: esphome/devices/.esphome
          key: esphome-build-${{ runner.os }}-${{ env.ESPHOME_VERSION }}-${{ hashFiles('esphome/devices/**/*.yaml', 'esphome/packages/**/*.yaml', 'esphome/common/**/*.yaml') }}
          restore-keys: |
            esphome-build-${{ runner.os }}-${{ env.ESPHOME_VERSION }}-
            esphome-build-${{ runner.os }}-
              
      - name: Determine artifact name
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "artifact_name=dev" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "artifact_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_name=under-bed-lighting-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create secrets.yaml
        run: |
          cat > devices/secrets.yaml <<'EOF'
          wifi_ssid: "${{ secrets.WIFI_SSID }}"
          wifi_password: "${{ secrets.WIFI_PASSWORD }}"
          api_key: "${{ secrets.API_KEY }}"
          ap_password: "${{ secrets.AP_PASSWORD }}"
          EOF

      - name: Compile ESPHome config
        run: uvx esphome@${{ env.ESPHOME_VERSION }} compile devices/under_bed_lighting.yaml

      - name: Stage release files
        run: |
          mkdir -p release
          find devices/.esphome/build -name firmware.bin -exec cp {} release/${{ steps.meta.outputs.artifact_name }}.bin \;
          find devices/.esphome/build -name firmware.ota.bin -exec cp {} release/${{ steps.meta.outputs.artifact_name }}.ota.bin \;
          find devices/.esphome/build -name firmware.map -exec cp {} release/${{ steps.meta.outputs.artifact_name }}.map \;
          find devices/.esphome/build -name firmware.factory.bin -exec cp {} release/${{ steps.meta.outputs.artifact_name }}.factory.bin \; || true

      - name: Upload staged release files
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: esphome/release/*
          if-no-files-found: error
